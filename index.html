<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MACOY JAPAN | メイソニック用品・OESレガリア 1849年創業</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: #fff; }
body {
  font-family: 'Inter Tight', sans-serif;
  font-weight: 500;
  -webkit-font-smoothing: antialiased;
}
#scroll-spacer {
  position: relative;
  height: 500vh;
  background: #fff;
  -webkit-user-select: none;
  user-select: none;
}
@media (hover: hover) and (pointer: fine) and (min-width: 1024px) {
  body { cursor: none; }
}

/* ---------- 1A custom cursor ---------- */
#cursor {
  position: fixed;
  left: -100px;
  top: -100px;
  z-index: 50;
  pointer-events: none;
  transform: translate(-50%, -50%);
  mix-blend-mode: exclusion;
  display: none;
}
@media (hover: hover) and (pointer: fine) and (min-width: 1024px) {
  #cursor { display: block; }
}

/* ---------- fade-in entry animation ---------- */
.fade-up {
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.6s cubic-bezier(0.25, 0.1, 0.25, 1),
              transform 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
}
.fade-up.in { opacity: 1; transform: translateY(0); }
.fade-in {
  opacity: 0;
  transition: opacity 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
}
.fade-in.in { opacity: 1; }

/* ---------- 1B logo ---------- */
#logo {
  position: fixed;
  top: 32px; left: 32px;
  z-index: 20;
  pointer-events: none;
  mix-blend-mode: exclusion;
  width: 355px;
}
/* ---------- 1C caption ---------- */
#caption {
  position: fixed;
  left: 32px; top: 244px;
  width: 692px;
  z-index: 20;
  pointer-events: none;
  mix-blend-mode: exclusion;
  font-size: 12px;
  line-height: 140%;
  letter-spacing: -0.04em;
  color: #fff;
}
/* ---------- 1D header nav ---------- */
#nav {
  position: fixed;
  top: 32px; right: 32px;
  width: 330px; height: 30px;
  z-index: 20;
  pointer-events: none;
  mix-blend-mode: exclusion;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: #fff;
  font-size: 15px;
  text-transform: uppercase;
  letter-spacing: -0.02em;
}
#nav .nav-right { display: flex; align-items: center; gap: 50px; }
#nav .ic-menu { width: 30px; height: 30px; }
/* ---------- 1E product info ---------- */
#outro-info {
  position: fixed;
  right: 32px; bottom: 80px;
  width: 330px;
  z-index: 20;
  pointer-events: none;
  mix-blend-mode: exclusion;
  display: flex;
  flex-direction: column;
  align-items: center;
  color: #fff;
}
#outro-info .top-block {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  width: 100%;
  margin-bottom: 32px;
}
#outro-info .circle-wrap {
  position: relative;
  width: 30px; height: 30px;
  margin-bottom: 14px;
}
#circle-symbol {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  letter-spacing: -0.04em;
  text-transform: uppercase;
}
#outro-info .col-label {
  width: 100%;
  font-size: 30px;
  line-height: 100%;
  text-align: center;
  letter-spacing: -0.04em;
  text-transform: uppercase;
}
#outro-info .price {
  font-size: 80px;
  line-height: 100%;
  text-align: center;
  letter-spacing: -0.04em;
}
/* ---------- 1F view button ---------- */
#outro-buy {
  position: fixed;
  right: 32px; bottom: 32px;
  width: 330px; height: 174px;
  z-index: 20;
  pointer-events: none;
  mix-blend-mode: exclusion;
  transform-origin: right bottom;
  transform: scale(0);
  background: #fff;
  border-radius: 1335px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
}
#outro-buy span {
  font-size: 110px;
  letter-spacing: -0.04em;
  color: #fff;
  mix-blend-mode: exclusion;
  line-height: 100%;
}
/* ---------- 1G video ---------- */
#main-canvas {
  position: fixed;
  inset: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
  opacity: 0;
  transition: opacity 0.3s ease;
}
#main-canvas video {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
}
#vid-left { display: none; }
#vid-right { display: block; }
/* ---------- 1I white overlay ---------- */
#outro-overlay {
  position: fixed;
  inset: 0;
  z-index: 12;
  pointer-events: none;
  background: #fff;
  opacity: 0;
}
/* ---------- 1J footer ---------- */
#outro-footer {
  position: fixed;
  left: 16px; bottom: 32px;
  z-index: 20;
  pointer-events: none;
  mix-blend-mode: exclusion;
  opacity: 0;
  display: flex;
  gap: 80px;
  color: #fff;
  font-size: 13px;
  letter-spacing: -0.02em;
  text-transform: uppercase;
}
/* ---------- 2 black panel ---------- */
#black-panel {
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 10;
  transform: translateY(100vh);
  overflow: hidden;
}
#panel-wrap {
  width: 100%;
  padding-top: min(400px, 40vh);
}
#panel-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  padding: 0 16px 20vh;
}
.bp-card {
  aspect-ratio: 2 / 3;
  will-change: transform;
  transform: scale(0);
  overflow: hidden;
}
.bp-card img {
  width: 100%; height: 100%;
  object-fit: contain;
  display: block;
  background: #0a0a0a;
}
.bp-card .cap {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  padding: 10px 12px;
  font-size: 11px;
  line-height: 1.3;
  letter-spacing: -0.02em;
  color: #fff;
  text-transform: uppercase;
  background: linear-gradient(to top, rgba(0,0,0,.72), transparent);
}
.bp-card { position: relative; }
.bp-empty { aspect-ratio: 2 / 3; }
@media (prefers-reduced-motion: reduce) {
  .bp-card { will-change: auto; }
}

/* ---------- responsive: tablet 640-1024 ---------- */
@media (max-width: 1023px) {
  #logo { width: 266px; }
  #caption { top: 180px; width: calc(50vw - 48px); }
  #panel-grid { grid-template-columns: repeat(3, 1fr); }
  #nav .nav-right { gap: 20px; }
}
/* ---------- responsive: mobile <640 ---------- */
@media (max-width: 639px) {
  #logo { width: 124px; top: 16px; left: 16px; }
  #caption { left: 16px; top: 118px; width: calc(100vw - 32px); }
  #nav {
    top: 16px; right: 16px;
    width: auto;
  }
  #nav .nav-about { display: none; }
  #nav .ic-menu { width: 24px; height: 24px; }
  #nav .cart { font-size: 13px; }
  #outro-info {
    left: 0; right: 0;
    width: auto;
    bottom: 48px;
  }
  #outro-info .top-block { width: 252px; margin: 0 auto 12px; }
  #outro-info .circle-wrap { width: 20px; height: 20px; margin-bottom: 10px; }
  #circle-symbol { font-size: 10px; }
  #outro-info .col-label { font-size: 20px; }
  #outro-info .price { font-size: 60px; }
  #outro-buy {
    left: 16px; right: 16px;
    width: auto; height: 100px;
    bottom: 60px;
  }
  #outro-buy span { font-size: 72px; }
  #main-canvas {
    top: 220px;
    height: calc(100vh - 220px);
  }
  #outro-footer {
    bottom: 24px;
    left: 16px; right: 16px;
    gap: 0;
    justify-content: space-between;
    font-size: 11px;
  }
  #panel-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div id="scroll-spacer">

  <!-- 1G video container -->
  <div id="main-canvas">
    <video id="vid-left" muted playsinline preload="auto"
      src="https://d8j0ntlcm91z4.cloudfront.net/user_39ca84eAE1ODL9hbR5VhoEj8tBf/hf_20260625_154433_532a85d3-dabf-4265-b8bd-19ac6af31842.mp4"></video>
    <video id="vid-right" muted playsinline preload="auto"
      src="https://d8j0ntlcm91z4.cloudfront.net/user_39ca84eAE1ODL9hbR5VhoEj8tBf/hf_20260625_154401_a664f076-b971-4557-8728-40ef9ea4c49b.mp4"></video>
  </div>

  <!-- 2 black panel gallery -->
  <div id="black-panel">
    <div id="panel-wrap">
      <div id="panel-grid"></div>
    </div>
  </div>

  <!-- 1I white overlay -->
  <div id="outro-overlay"></div>

  <!-- 1B logo -->
  <div id="logo" class="fade-up">
    <svg viewBox="0 0 355 110" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">
      <text x="0" y="82" fill="#fff" font-family="'Inter Tight',sans-serif" font-weight="500"
        font-size="92" letter-spacing="-5">MACOY</text>
      <g transform="translate(326,10)">
        <circle cx="14" cy="14" r="12.5" stroke="#fff" stroke-width="2.5" fill="none"/>
        <text x="14" y="19" fill="#fff" text-anchor="middle"
          font-family="'Inter Tight',sans-serif" font-weight="500" font-size="14">R</text>
      </g>
      <text x="1" y="104" fill="#fff" font-family="'Inter Tight',sans-serif" font-weight="500"
        font-size="15" letter-spacing="6">SINCE 1849 JAPAN</text>
    </svg>
  </div>

  <!-- 1C caption -->
  <div id="caption" class="fade-up">SINCE 1849 &nbsp;/&nbsp; RICHMOND, VA<br><br>百七十余年、儀礼に宿る格式を仕立て続ける。Macoy Publishing &amp; Masonic Supply Co. は、フリーメイソンおよびイースタンスター(OES)のレガリア、書籍、ロッジ用品を手がける米国の老舗。職人の手仕事による本物を、日本へ。</div>

  <!-- 1D nav -->
  <div id="nav" class="fade-up">
    <span class="nav-about">ABOUT</span>
    <span class="nav-right">
      <svg class="ic-menu" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" fill="none">
        <path d="M0 14H40" stroke="#fff" stroke-width="2.5"/>
        <path d="M0 26H40" stroke="#fff" stroke-width="2.5"/>
      </svg>
      <span class="cart">[ CATALOG ]</span>
    </span>

  <!-- 1E product info -->
  <div id="outro-info" class="fade-in" data-outro-offset="166">
    <div class="top-block">
      <div class="circle-wrap">
        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" fill="none" style="width:100%;height:100%">
          <circle cx="20" cy="20" r="18.75" stroke="#fff" stroke-width="2.5"/>

  <!-- 1F view button -->

  <!-- 1J footer -->
  <div id="outro-footer">
    <span>MACOY (R) SINCE 1849</span>
    <span>PRIVACY POLICY</span>
  </div>

  <!-- 1A custom cursor -->
  <div id="cursor">
    <svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" fill="none">
      <circle cx="24" cy="24" r="22.75" stroke="#fff" stroke-width="2.5"/>
      <path fill="#fff" d="M24 12l2.2 8.2 8.2-2.2-6 6 6 6-8.2-2.2L24 36l-2.2-8.2-8.2 2.2 6-6-6-6 8.2 2.2z"/>
    </svg>
  </div>

</div>

<script>
(function () {
  'use strict';

  var vh = window.innerHeight;
  var isTouch = window.matchMedia('(hover: none), (pointer: coarse)').matches
             || window.innerWidth < 1024;
  var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var spacer = document.getElementById('scroll-spacer');
  var panel = document.getElementById('black-panel');
  var wrap = document.getElementById('panel-wrap');
  var grid = document.getElementById('panel-grid');
  var canvas = document.getElementById('main-canvas');
  var vidL = document.getElementById('vid-left');
  var vidR = document.getElementById('vid-right');
  var overlay = document.getElementById('outro-overlay');
  var footer = document.getElementById('outro-footer');
  var info = document.getElementById('outro-info');
  var buy = document.getElementById('outro-buy');
  var symbol = document.getElementById('circle-symbol');
  var cursor = document.getElementById('cursor');

  /* ---------- entry animations (staggered) ---------- */
  var entries = [
    ['logo', 0], ['nav', 150], ['caption', 300], ['outro-info', 450]
  ];
  entries.forEach(function (e) {
    setTimeout(function () {
      document.getElementById(e[0]).classList.add('in');
    }, e[1] + 30);
  });

  /* ---------- gallery images ---------- */
  var GALLERY = [
    { img: 'images/1715.jpg', n: '33RD Degree Scottish Rite Gold Chain Collar' },
    { img: 'images/1038_t.jpg', n: 'Blue Lodge Gold Plate Masonic Chain Collar' },
    { img: 'images/2005New_t.jpg', n: 'Masonic Casket Apron' },
    { img: 'images/b17_t.jpg', n: 'Masonic & OES Mourning Badges' },
    { img: 'images/1040_1040R_t.jpg', n: "Officer's Collar Chain" },
    { img: 'images/2501_t.jpg', n: 'Associate Matron Purple Velvet Sash' },
    { img: 'images/SwordBelt_t.jpg', n: 'Masonic Sword Belt' },
    { img: 'images/2068_t.JPG', n: 'Double Rayon Silk Ribbon Jewel Hangers' },
    { img: 'images/1042.JPG', n: 'Grand Lodge Chain Collar, Purple Lining' },
    { img: 'images/2107.JPG', n: 'Masonic Officer Collar, Royal Blue Trim' }
  ];
  var IMGS = GALLERY.map(function (g) { return g.img; });

  /* ---------- grid layout algorithm ---------- */
  function cols() {
    var w = window.innerWidth;
    if (w < 640) return 2;
    if (w < 1024) return 3;
    return 4;
  }
  function buildLayout(count, c) {
    var cells = [];
    var placed = 0, r = 0;
    while (placed < count) {
      var row = [];
      for (var i = 0; i < c; i++) row.push(-1);
      var a = (r * 2 + (r % 2)) % c;
      row[a] = placed++;
      if (r % 3 === 0 && placed < count) {
        var b = (a + 2) % c;
        if (b === a) b = (a + 1) % c;
        row[b] = placed++;
      }
      cells = cells.concat(row);
      r++;
    }
    return cells;
  }

  var cards = [];
  function renderGrid() {
    var c = cols();
    grid.style.gridTemplateColumns = 'repeat(' + c + ', 1fr)';
    grid.innerHTML = '';
    cards = [];
    var cells = buildLayout(IMGS.length, c);
    cells.forEach(function (idx, i) {
      if (idx === -1) {
        var sp = document.createElement('div');
        sp.className = 'bp-empty';
        grid.appendChild(sp);
        return;
      }
      var d = document.createElement('div');
      d.className = 'bp-card';
      var col = i % c;
      d.style.transformOrigin = (col < c / 2) ? 'right bottom' : 'left bottom';
      var img = document.createElement('img');
      img.src = GALLERY[idx].img;
      img.alt = GALLERY[idx].n;
      img.loading = 'lazy';
      d.appendChild(img);
      var cap = document.createElement('div');
      cap.className = 'cap';
      cap.textContent = GALLERY[idx].n;
      d.appendChild(cap);
      grid.appendChild(d);
      cards.push(d);
    });
  }
  renderGrid();

  /* ---------- spacer height ---------- */
  var maxScroll = 0;
  function measure() {
    vh = window.innerHeight;
    maxScroll = Math.max(0, wrap.scrollHeight - vh);
    spacer.style.height = (vh + maxScroll + 2 * vh) + 'px';
  }
  measure();

  /* ---------- video load fade-in ---------- */
  var loaded = 0;
  function onVidReady() {
    loaded++;
    if (loaded >= 2) canvas.style.opacity = '1';
  }
  [vidL, vidR].forEach(function (v) {
    if (v.readyState >= 2) onVidReady();
    else v.addEventListener('loadeddata', onVidReady, { once: true });
  });
  setTimeout(function () { canvas.style.opacity = '1'; }, 2500);

  /* ---------- desktop: cursor scrub / mobile: alternate autoplay ---------- */
  var mouseX = window.innerWidth / 2;
  var activeSide = 'right';

  if (isTouch) {
    if (!reduced) {
      vidR.style.display = 'none';
      vidL.style.display = 'block';
      vidL.play().catch(function () {});
      vidL.addEventListener('ended', function () {
        vidL.style.display = 'none';
        vidR.style.display = 'block';
        vidR.currentTime = 0;
        vidR.play().catch(function () {});
      });
      vidR.addEventListener('ended', function () {
        vidR.style.display = 'none';
        vidL.style.display = 'block';
        vidL.currentTime = 0;
        vidL.play().catch(function () {});
      });
    }
  } else {
    document.addEventListener('mousemove', function (e) {
      mouseX = e.clientX;
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });
  }

  function scrubVideos() {
    if (isTouch) return;
    var w = window.innerWidth;
    var center = w / 2;
    var dead = Math.max(30, w * 0.05);
    var v, progress;

    if (Math.abs(mouseX - center) <= dead) {
      v = (activeSide === 'left') ? vidR : vidL;
      var cur = (activeSide === 'right') ? vidR : vidL;
      /* dead zone: keep at 0, show last active */
      if (!cur.seeking && cur.currentTime !== 0) cur.currentTime = 0;
      return;
    }
    if (mouseX < center - dead) {
      /* left of dead zone: show RIGHT video */
      if (activeSide !== 'right') {
        activeSide = 'right';
        vidL.style.display = 'none';
        vidR.style.display = 'block';
      }
      var range = center - dead;
      progress = (center - dead - mouseX) / range;
      v = vidR;
    } else {
      /* right of dead zone: show LEFT video */
      if (activeSide !== 'left') {
        activeSide = 'left';
        vidR.style.display = 'none';
        vidL.style.display = 'block';
      }
      var range2 = w - (center + dead);
      progress = (mouseX - center - dead) / range2;
      v = vidL;
    }
    progress = Math.max(0, Math.min(1, progress));
    if (v.duration && !v.seeking) {
      v.currentTime = progress * v.duration;
    }
  }

  /* ---------- circle symbol randomize on scroll ---------- */
  var SYMS = ['8', '$', '^^', '%', '/'];
  var lastSym = 0;
  window.addEventListener('scroll', function () {
    var now = Date.now();
    if (now - lastSym < 80) return;
    lastSym = now;
    symbol.textContent = SYMS[Math.floor(Math.random() * SYMS.length)];
  }, { passive: true });

  /* ---------- card scaling ---------- */
  function updateCards() {
    for (var i = 0; i < cards.length; i++) {
      var rect = cards[i].getBoundingClientRect();
      var s;
      if (rect.bottom <= 0 || rect.top >= vh) {
        s = 0;
      } else {
        var enter = Math.min(1, (vh - rect.top) / (vh * 0.6));
        var exit = Math.min(1, rect.bottom / (vh * 0.4));
        s = Math.max(0, Math.min(enter, exit));
      }
      cards[i].style.transform = 'scale(' + s + ')';
    }
  }

  /* ---------- main RAF loop: scroll phases ---------- */
  var outroOffset = parseFloat(info.getAttribute('data-outro-offset')) || 166;
  function applyOutroOffset() {
    outroOffset = (window.innerWidth < 640) ? 132 : 166;
  }
  applyOutroOffset();

  function frame() {
    var y = window.scrollY || window.pageYOffset;

    /* phase 1: panel slides up */
    if (y <= vh) {
      panel.style.transform = 'translateY(' + (vh - y) + 'px)';
      wrap.style.transform = 'translateY(0)';
    } else {
      /* phase 2: panel fixed, inner wrapper scrolls */
      panel.style.transform = 'translateY(0)';
      wrap.style.transform = 'translateY(' + (-(y - vh)) + 'px)';
    }

    /* hide videos past first viewport */
    canvas.style.visibility = (y > vh) ? 'hidden' : 'visible';

    /* outro */
    var op = 0;
    if (y > vh + maxScroll) {
      op = Math.max(0, Math.min(1, (y - vh - maxScroll) / (vh - 100)));
    }
    overlay.style.opacity = op;
    footer.style.opacity = op;
    info.style.transform = 'translateY(' + (-outroOffset * op) + 'px)';
    buy.style.transform = 'scale(' + op + ')';
    buy.style.pointerEvents = (op > 0.5) ? 'auto' : 'none';

    updateCards();
    scrubVideos();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  /* ---------- resize ---------- */
  var rzT;
  window.addEventListener('resize', function () {
    clearTimeout(rzT);
    rzT = setTimeout(function () {
      renderGrid();
      applyOutroOffset();
      measure();
    }, 150);
  });
  window.addEventListener('load', measure);
})();
</script>
</body>
</html>
